<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e84393"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Rink outline -->
  <ellipse cx="256" cy="256" rx="180" ry="140" fill="#e8f4f8" stroke="#c0392b" stroke-width="6"/>
  <!-- Center line -->
  <line x1="256" y1="116" x2="256" y2="396" stroke="#c0392b" stroke-width="4"/>
  <!-- Blue lines -->
  <line x1="190" y1="116" x2="190" y2="396" stroke="#2471a3" stroke-width="5"/>
  <line x1="322" y1="116" x2="322" y2="396" stroke="#2471a3" stroke-width="5"/>
  <!-- Center circle -->
  <circle cx="256" cy="256" r="35" fill="none" stroke="#2471a3" stroke-width="3"/>
  <!-- YOU player -->
  <circle cx="290" cy="230" r="30" fill="#e84393" stroke="#fff" stroke-width="5"/>
  <text x="290" y="238" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold" font-family="sans-serif">YOU</text>
  <!-- Puck -->
  <circle cx="230" cy="280" r="14" fill="#222" stroke="#fff" stroke-width="3"/>
</svg>
